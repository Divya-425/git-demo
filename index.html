<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Demo Project</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            width: 70%;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h1 {
            color: #2c3e50;
        }

        p {
            color: #555;
            font-size: 18px;
        }

        button {
            background: #007BFF;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        footer {
            margin-top: 30px;
            color: gray;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Git & GitHub Demo</h1>

        <p>
            This is a simple HTML page created to practice Git and GitHub commands.
        </p>

        <button onclick="showMessage()">Click Me</button>

        <p id="message"></p>

        <footer>
            © 2026 Git Demo Project
        </footer>
    </div>

    <script>
        function showMessage() {
            document.getElementById("message").innerHTML =
                "🎉 Congratulations! JavaScript is working.";
        }
    </script>

</body>
</html>
